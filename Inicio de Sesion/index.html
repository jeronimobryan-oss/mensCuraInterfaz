<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mens Cura - Inicio de Sesión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="formulario">
        <img src="isologo.png" alt="Logo de mens cura" class="logo-placeholder">
        <form method="post" action="#">    
            <div class="input-group">
                <input type="email" id="loginEmail" required>
                <label>Correo electrónico</label>
            </div>  
            <div class="input-group">
                <input type="password" id="loginPass" required>
                <label>Contraseña</label>
            </div>

            <div class="links-container">
                <div class="link-pill">
                <a href="../Olvide.html/miContrasena.html">Olvidé mi contraseña</a>
                </div>
                <div class="link-pill">
                    <a href="../CrearCuenta/crear.html">Crear Cuenta</a>
                </div>
            </div>

            <div class="button-container">
                <button type="submit" class="btn-iniciar">
                    Iniciar Sesión
                </button>
            </div>
        </form>
    </div>
    <script src="inicio.js"></script>
</body>
</html>
