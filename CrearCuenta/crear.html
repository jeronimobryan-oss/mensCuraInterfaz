<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mens Cura - Crear Cuenta</title>
    <link rel="stylesheet" href="crearCuenta.css">
</head>
<body>

    <div class="formulario-container">
        <div class="formulario">
            <img src="isologo.png" alt="Logo de mens cura" class="logo-placeholder">
            
            <h2>Crear cuenta</h2>

            <form id="registroForm" method="POST" action="registro.php">    
                <div class="input-group">
                    <input type="text" id="regName" name="nombre" required placeholder=" ">
                    <label for="regName">Nombre completo</label>
                </div>

                <div class="input-group">
                    <input type="email" id="regEmail" name="correo" required placeholder=" ">
                    <label for="regEmail">Correo electrónico</label>
                </div>

                <div class="input-group">
                    <input type="password" id="regPass" name="password" required placeholder=" ">
                    <label for="regPass">Contraseña</label>
                </div>

                <div class="input-group">
                    <input type="password" id="confirmPass" name="confirm_password" required placeholder=" ">
                    <label for="confirmPass">Confirmar contraseña</label>
                </div>

                <div class="links-container">
                    <div class="link-pill">
                        <a href="/Inicio de Sesion/index.html">¿Ya tienes cuenta? Inicia sesión</a>
                    </div>
                </div>

                <div class="button-container">
                    <button type="submit" class="btn-iniciar">
                        Registrarse
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="crearCuenta.js"></script>
</body>
</html>
